syntax = "proto3";
package companyhelm.agent.v1;

import "buf/validate/validate.proto";

service AgentActorService {
  // Creates a new task.
  rpc ListActors(ListActorsRequest) returns (ListActorsResponse);
}

message ListActorsRequest {
}

message ListActorsResponse {
  repeated Actor actors = 1;
}

message Actor {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.min_len = 1];
  string description = 3 [(buf.validate.field).string.min_len = 1];
  repeated string reportee_actor_ids = 4;
}
