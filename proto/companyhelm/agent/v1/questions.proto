syntax = "proto3";
package companyhelm.agent.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service AgentQuestionService {
  // Creates a new question for a thread.
  rpc CreateQuestion(CreateQuestionRequest) returns (CreateQuestionResponse);
}

message AnswerOption {
  string text = 1 [(buf.validate.field).string.min_len = 1];
  optional bool is_recommended = 2;
  optional AnswerRank rank = 3 [(buf.validate.field).enum.defined_only = true];
}

enum AnswerRank {
  ANSWER_RANK_UNSPECIFIED = 0;
  ATROCIOUS = 1;
  BAD = 2;
  AVERAGE = 3;
  GOOD = 4;
  EXCELLENT = 5;
}

message CreateQuestionRequest {
  string thread_id = 1 [(buf.validate.field).string.min_len = 1];
  string question_text = 2 [(buf.validate.field).string.min_len = 1];
  repeated AnswerOption options = 3;
}

message CreateQuestionResponse {
}
