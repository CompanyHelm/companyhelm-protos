syntax = "proto3";
package companyhelm.agent.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service AgentTaskService {
  // Creates a new task.
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  // Returns core task details.
  rpc GetTaskDetails(GetTaskDetailsRequest) returns (GetTaskDetailsResponse);
  // Adds a dependency edge to a task.
  rpc AddTaskDependency(AddTaskDependencyRequest) returns (AddTaskDependencyResponse);
  // Returns direct dependency tasks for the given task.
  rpc ListTaskDependencies(ListTaskDependenciesRequest) returns (ListTaskDependenciesResponse);
  // Returns tasks that directly depend on the given task.
  rpc ListDependentTasks(ListDependentTasksRequest) returns (ListDependentTasksResponse);
  // Returns dependency-backed sub tasks for the given task.
  rpc ListSubTasks(ListSubTasksRequest) returns (ListSubTasksResponse);
  // Returns comments for the given task.
  rpc ListTaskComments(ListTaskCommentsRequest) returns (ListTaskCommentsResponse);
  // Updates task status only.
  rpc UpdateTaskStatus(UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);
  // Adds a comment to a task.
  rpc AddTaskComment(AddTaskCommentRequest) returns (AddTaskCommentResponse);
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_DRAFT = 1;
  TASK_STATUS_PENDING = 2;
  TASK_STATUS_IN_PROGRESS = 3;
  TASK_STATUS_COMPLETED = 4;
}

message Task {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.min_len = 1];
  optional string description = 3;
  optional string acceptance_criteria = 4;
  optional string assignee_principal_id = 5;
  optional string thread_id = 6;
  TaskStatus status = 7 [(buf.validate.field).enum.defined_only = true];
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  optional string parent_task_id = 10;
}

message TaskDependency {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string dependency_task_id = 2 [(buf.validate.field).string.min_len = 1];
}

message TaskComment {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string task_id = 2 [(buf.validate.field).string.min_len = 1];
  string comment = 3 [(buf.validate.field).string.min_len = 1];
  string author_principal_id = 4 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message CreateTaskRequest {
  string name = 1 [(buf.validate.field).string.min_len = 1];
  optional string description = 2;
  optional string acceptance_criteria = 3;
  optional string assignee_principal_id = 4;
  optional string thread_id = 5;
  optional string parent_task_id = 6;
}

message CreateTaskResponse {
  Task task = 1;
}

message GetTaskDetailsRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetTaskDetailsResponse {
  Task task = 1;
}

message AddTaskDependencyRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string dependency_task_id = 2 [(buf.validate.field).string.min_len = 1];
}

message AddTaskDependencyResponse {
  TaskDependency dependency = 1;
}

message ListTaskDependenciesRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message ListTaskDependenciesResponse {
  repeated Task tasks = 1;
}

message ListDependentTasksRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message ListDependentTasksResponse {
  repeated Task tasks = 1;
}

message ListSubTasksRequest {
  // Parent task id from tasks.id.
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message ListSubTasksResponse {
  repeated Task tasks = 1;
}

message ListTaskCommentsRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
}

message ListTaskCommentsResponse {
  repeated TaskComment comments = 1;
}

message UpdateTaskStatusRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  TaskStatus status = 2 [(buf.validate.field).enum.defined_only = true];
}

message UpdateTaskStatusResponse {
  Task task = 1;
}

message AddTaskCommentRequest {
  string task_id = 1 [(buf.validate.field).string.min_len = 1];
  string comment = 2 [(buf.validate.field).string.min_len = 1];
}

message AddTaskCommentResponse {
  TaskComment comment = 1;
}
